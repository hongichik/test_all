USER_ID_FIELD: session_id
field_separator: "\t"
seq_separator: " "
benchmark_filename: [train, valid, test]
# Bắt buộc alias item_id_list → item_id (không alias → test CUDA index OOB).
# NumPy 2: gọi ncs_numpy_compat.apply_numpy_recbole_compat() trước import recbole.
alias_of_item_id: [item_id_list]
load_col:
  inter: [session_id, item_id_list, item_id]

topk: [10, 20]
metrics: [Recall, MRR]
valid_metric: MRR@20
eval_batch_size: 2048
stopping_step: 5
eval_args:
  order: TO
  split:
    RS: [0.8, 0.1, 0.1]
  group_by: user
  mode:
    valid: full
    test: full

neg_sampling: ~
training_neg_sample_num: 0
train_neg_sample_args: ~
